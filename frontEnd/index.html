<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel - Escritorio de Advocacia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/styles/main.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand-block">
          <h1>Sistema Juridico</h1>
          <p class="subtitle">Escritorio de Advocacia</p>
        </div>

        <nav class="sidebar-nav" aria-label="Consultas">
          <button id="btnAdvogados" class="nav-item is-active" type="button">Advogados</button>
          <button id="btnClientes" class="nav-item" type="button">Clientes</button>
          <button id="btnEscritorios" class="nav-item" type="button">Escritorios</button>
          <button id="btnProcessos" class="nav-item" type="button">Processos</button>
        </nav>
      </aside>

      <main class="content">
        <header class="topbar">
          <div>
            <h2>Painel Operacional</h2>
          </div>
          <div class="status-badge" id="statusText">Nenhuma consulta executada.</div>
        </header>

        <section class="kpi-grid" aria-label="Resumo rapido">
          <article class="kpi-card">
            <p class="kpi-label">Registros na tabela</p>
            <p id="kpiRows" class="kpi-value">0</p>
          </article>
          <article class="kpi-card">
            <p class="kpi-label">Modulo ativo</p>
            <p id="kpiModulo" class="kpi-value">Advogados</p>
          </article>
        </section>

        <section class="panel" aria-label="Filtros">
          <div class="panel-head">
            <h3>Filtros e Buscas</h3>
          </div>

          <div class="filter-grid">
            <form id="formAdvogadoNome" class="inline-form">
              <label for="advogadoNome">Advogado por nome</label>
              <div class="field-row">
                <input id="advogadoNome" class="input" name="nome" placeholder="Ex.: Joao Silva" required />
                <button class="btn" type="submit">Buscar</button>
              </div>
            </form>

            <form id="formClienteNome" class="inline-form">
              <label for="clienteNome">Cliente por nome</label>
              <div class="field-row">
                <input id="clienteNome" class="input" name="nome" placeholder="Ex.: Maria Souza" required />
                <button class="btn" type="submit">Buscar</button>
              </div>
            </form>

            <form id="formEscritorioEmail" class="inline-form">
              <label for="escritorioEmail">Escritorio por email</label>
              <div class="field-row">
                <input id="escritorioEmail" class="input" name="email" placeholder="Ex.: contato@alpha.com" required />
                <button class="btn" type="submit">Buscar</button>
              </div>
            </form>

            <form id="formEscritorioTelefone" class="inline-form">
              <label for="escritorioTelefone">Escritorio por telefone</label>
              <div class="field-row">
                <input id="escritorioTelefone" class="input" name="telefone" placeholder="Ex.: 65999990000" required />
                <button class="btn" type="submit">Buscar</button>
              </div>
            </form>

            <div class="inline-form">
              <label for="tableFilter">Filtro local na tabela</label>
              <div class="field-row">
                <input id="tableFilter" class="input" placeholder="Filtrar valores exibidos..." />
                <button id="btnClearFilter" class="btn btn-secondary" type="button">Limpar</button>
              </div>
            </div>
          </div>
        </section>

        <section class="panel" aria-label="Resultados">
          <div class="panel-head">
            <h3 id="tableTitle">Resultados</h3>
          </div>
          <div class="table-wrap">
            <table>
              <thead id="tableHead"></thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
        </section>

        <section class="panel" aria-label="Operacoes de escrita">
          <div class="panel-head">
            <h3>Operacoes de Escrita</h3>
          </div>

          <form id="formWriteOperation" class="write-grid">
            <label class="field-block" for="writeResource">
              Recurso
              <select id="writeResource" class="input" name="resource">
                <option value="advogados">Advogados</option>
                <option value="clientes">Clientes</option>
                <option value="escritorios">Escritorios</option>
                <option value="processos">Processos</option>
              </select>
            </label>

            <label class="field-block" for="writeMethod">
              Acao
              <select id="writeMethod" class="input" name="method">
                <option value="criar">Criar</option>
                <option value="atualizar">Atualizar</option>
                <option value="apagar">Apagar</option>
              </select>
            </label>

            <label class="field-block" for="writeId">
              ID (obrigatorio em Atualizar e Apagar)
              <input id="writeId" class="input" name="id" placeholder="Ex.: 1" />
            </label>

            <div id="simpleAdvogados" class="field-block field-block-full simple-box" aria-label="Formulario simples de advogado">
              <strong>Formulario de Advogados</strong>
              <div class="simple-grid">
                <input id="advEscritorioId" class="input" placeholder="Escritorio ID *" />
                <input id="advNome" class="input" placeholder="Nome *" />
                <input id="advOab" class="input" placeholder="OAB *" />
                <input id="advEspecialidade" class="input" placeholder="Especialidade" />
                <input id="advEmail" class="input" placeholder="Email" />
                <input id="advTelefone" class="input" placeholder="Telefone" />
                <select id="advAtivo" class="input">
                  <option value="1">Ativo</option>
                  <option value="0">Inativo</option>
                </select>
              </div>
            </div>

            <div id="simpleClientes" class="field-block field-block-full simple-box" aria-label="Formulario simples de cliente" hidden>
              <strong>Formulario de Clientes</strong>
              <div class="simple-grid">
                <input id="cliNome" class="input" placeholder="Nome *" />
                <input id="cliDocumento" class="input" placeholder="Documento" />
                <input id="cliEmail" class="input" placeholder="Email" />
                <input id="cliTelefone" class="input" placeholder="Telefone" />
                <input id="cliEndereco" class="input" placeholder="Endereco" />
                <input id="cliCidade" class="input" placeholder="Cidade" />
                <input id="cliEstado" class="input" placeholder="Estado" />
                <input id="cliCep" class="input" placeholder="CEP" />
              </div>
            </div>

            <div id="simpleEscritorios" class="field-block field-block-full simple-box" aria-label="Formulario simples de escritorio" hidden>
              <strong>Formulario de Escritorios</strong>
              <div class="simple-grid">
                <input id="escNome" class="input" placeholder="Nome *" />
                <input id="escCnpj" class="input" placeholder="CNPJ *" />
                <input id="escEmail" class="input" placeholder="Email" />
                <input id="escTelefone" class="input" placeholder="Telefone" />
                <input id="escEndereco" class="input" placeholder="Endereco" />
                <input id="escCidade" class="input" placeholder="Cidade" />
                <input id="escEstado" class="input" placeholder="Estado" />
                <input id="escCep" class="input" placeholder="CEP" />
              </div>
            </div>

            <div id="simpleProcessos" class="field-block field-block-full simple-box" aria-label="Formulario simples de processo" hidden>
              <strong>Formulario de Processos</strong>
              <div class="simple-grid">
                <input id="proEscritorioId" class="input" placeholder="Escritorio ID (obrigatorio em Atualizar)" />
                <input id="proAdvogadoId" class="input" placeholder="Advogado ID" />
                <input id="proClienteId" class="input" placeholder="Cliente ID" />
                <input id="proNumero" class="input" placeholder="Numero" />
                <input id="proTitulo" class="input" placeholder="Titulo" />
                <input id="proStatus" class="input" placeholder="Status" />
                <input id="proDescricao" class="input" placeholder="Descricao" />
              </div>
            </div>

            <button class="btn" type="submit">Executar operacao</button>
          </form>
        </section>

      </main>
    </div>

    <script src="./main.js"></script>
  </body>
</html>
